# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  BUILD_DIR: build
  INSTALL_DIR: install

tasks:
  default:
    desc: Run the examples
    cmds:
      - task: run

  clean:
    desc: Clean build/install artifacts
    cmd: rm -rf {{.BUILD_DIR}} {{.INSTALL_DIR}}

  configure:
    desc: Configure the project
    requires:
      vars: [PRESET]
    cmd: cmake --preset {{.PRESET}}

  build:
    desc: Build the project
    requires:
      vars: [PRESET]
    cmd: cmake --build --preset {{.PRESET}} {{if .TARGET}}--target {{.TARGET}}{{end}}

  install:
    desc: Install the project
    cmd: cmake --install {{.BUILD_DIR}}

  tests:
    desc: Run tests
    requires:
      vars: [PRESET]
    cmd: ctest --output-on-failure --preset {{.PRESET}} {{if .TAG}}-R {{.TAG}}{{end}}

  run:
    desc: Configure/Build/Run the project example
    requires:
      vars: [TARGET]
    vars:
      PRESET: example
    cmds:
      - task: configure
        vars:
          PRESET: "{{.PRESET}}"
        if: '[ {{.ENABLE_CONFIGURE}} = "true" ]'
      - task: build
        vars:
          PRESET: "{{.PRESET}}"
          TARGET: "{{.TARGET}}"
      - cmd: ./{{.BUILD_DIR}}/examples/{{.TARGET}}
    silent: true

  run:tests:
    desc: Configure/Build/Run the project tests
    vars:
      PRESET: example
      TARGET: Tests
    cmds:
      - task: configure
        vars:
          PRESET: "{{.PRESET}}"
        if: '[ {{.ENABLE_CONFIGURE}} = "true" ]'
      - task: build
        vars:
          PRESET: "{{.PRESET}}"
          TARGET: "{{.TARGET}}"
      - task: tests
        vars:
          PRESET: "{{.PRESET}}"
    silent: true
